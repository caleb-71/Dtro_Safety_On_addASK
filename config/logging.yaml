# config/logging.yaml
version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    formatter: standard
    level: INFO
    filename: data/outputs/logs/dtro_safety_on.log
    maxBytes: 5242880        # 5MB
    backupCount: 5
    encoding: utf-8
    delay: true

root:
  level: INFO
  handlers: [console, file]
